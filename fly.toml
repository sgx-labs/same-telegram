app = "same-telegram"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]

[env]
  VAULT_PATH = "/data/vault"
  SAME_HOME = "/data"
  BOT_MODE = "workspace"
  WORKSPACE_APP_NAME = "samevault-workspaces"
  FLY_REGION = "iad"
  FLY_IMAGE = "registry.fly.io/samevault-workspaces:deployment-01KKHX5EKACMRYXX969WZAMVZ7"
  ALLOWED_USER_IDS = "95419682,223389379,147604529,1056335543,92100691,182189507,64940920,1032905459"

# No HTTP services — this is a long-poll Telegram bot, not a web server.

[mounts]
  source = "same_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = 256
  auto_stop_machines = "off"
  auto_start_machines = false
