app = "samevault-workspaces"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.workspace"

# This app doesn't run machines directly — machines are created
# on-demand per-user via the Fly Machines API from the bot.
#
# Deploy with: fly deploy -c fly.workspace.toml --build-only
# This builds and pushes the image to the registry without creating machines.
# Do NOT run plain "fly deploy" — it will create unwanted app-level machines.

[env]
  VAULT_PATH = "/data/vault"
  SAME_HOME = "/data"
  TERM = "xterm-256color"
